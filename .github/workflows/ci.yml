name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SECRET_KEY: ci-insecure-secret-key-for-testing-only
      DEBUG: "true"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: python manage.py test

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"
      - name: Install dependencies and security tools
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit pip-audit
      - name: Run bandit (SAST) — fail on HIGH/CRITICAL findings
        run: bandit -r main/ -lll -f sarif -o bandit.sarif
      - name: Upload bandit SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@17a820bf2e43b47be2c72b39cc905417bc1ab6d0  # v3.28.6
        with:
          sarif_file: bandit.sarif
      - name: Run pip-audit (CVE scan) — fail on any finding
        run: pip-audit -r requirements.txt
