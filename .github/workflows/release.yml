name: Release

on:
  release:
    types: [published]

jobs:
  release-artefacts:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      SECRET_KEY: ci-insecure-secret-key-for-testing-only
      DEBUG: "true"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"
      - name: Install dependencies and release tools
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit==2.10.1 pip-tools==7.5.3 cyclonedx-bom==7.3.0
      - name: Run tests
        run: python manage.py test
      - name: Run pip-audit (CVE scan — release gate)
        run: pip-audit -r requirements.txt
      - name: Generate hashed requirements (supply chain — CAF A4.a)
        run: pip-compile requirements.txt --generate-hashes --output-file requirements-hashed.txt
      - name: Generate SBOM in CycloneDX format (CAF A4.a)
        run: cyclonedx-py requirements requirements.txt --output-format JSON -o sbom.json
      - name: Upload release artefacts (retained 90 days)
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b  # v4.5.0
        with:
          name: release-artefacts-${{ github.sha }}
          path: |
            requirements-hashed.txt
            sbom.json
          retention-days: 90
      - name: Attach artefacts to GitHub Release (5-year retention — CAF A4.a)
        run: gh release upload --clobber "${{ github.ref_name }}" requirements-hashed.txt sbom.json
        env:
          GH_TOKEN: ${{ github.token }}
